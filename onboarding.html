<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro profissional completo | UpSaude</title>
  <meta name="description" content="Cadastro profissional completo para validação e liberação de prescrições digitais." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand">
        <img class="brand-logo" src="./public/logo-consultorio-digital.png" alt="Consultório Digital" onerror="this.style.display='none'" />
        <span class="brand-text"><span class="brand-up">UP</span><span class="brand-saude">SAÚDE</span></span>
      </div>
      <div class="step-actions">
        <a class="step-back" href="./apresentacao.html#step-6" aria-label="Voltar">←</a>
        <span class="badge step-1">Cadastro profissional</span>
      </div>
    </div>

    <section class="layout single">
      <article class="panel form-wrap">
        <header class="form-header">
          <h2>Crie seu cadastro profissional completo</h2>
          <p>Validamos seus dados profissionais para liberar recursos como prescrições digitais com segurança.</p>
        </header>

        <form id="onboardingForm" class="form-grid" novalidate>
          <div>
            <label for="nome">Nome completo</label>
            <input id="nome" name="nome" type="text" placeholder="Seu nome" autocomplete="name" required />
          </div>

          <div>
            <label for="email">E-mail profissional</label>
            <input id="email" name="email" type="email" placeholder="voce@clinica.com" autocomplete="email" required />
          </div>

          <div class="row-2">
            <div>
              <label for="cpf">CPF</label>
              <input id="cpf" name="cpf" type="text" placeholder="000.000.000-00" inputmode="numeric" required />
            </div>
            <div>
              <label for="crm">Registro profissional</label>
              <input id="crm" name="crm" type="text" placeholder="CRM / CRP / CREFITO..." required />
            </div>
          </div>

          <p class="error-text" id="formMsg"></p>

          <button class="btn btn-primary btn-lg btn-pulse" type="submit">
            Continuar
            <span class="btn-arrow">→</span>
          </button>

          <div class="secure-row tight">
            <span>🔒 Dados criptografados</span>
            <span>🛡️ LGPD</span>
            <span>⏱️ Menos de 2 min</span>
          </div>

          <p class="footnote">Seus dados são usados apenas para liberar seu acesso profissional. Sem spam.</p>
        </form>
      </article>
    </section>
  </main>

  <script src="./app.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var badge = document.querySelector('.badge');
      if (badge) setTimeout(function () { badge.classList.add('prog-1'); }, 400);
    });
  </script>
  <style>
    .badge { position: relative; overflow: hidden; }
    .badge::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      height: 3px; width: 0;
      background: linear-gradient(90deg, #8f2bd3, #bf49f4);
      border-radius: 99px;
      transition: width 1s cubic-bezier(.22,1,.36,1);
    }
    .badge.prog-1::after { width: 75%; }
  </style>
</body>
</html>
