<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding | UpSaude</title>
  <meta name="description" content="Onboarding para profissionais da saúde: Nome, E-mail, CPF e CRM." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand">
        <img class="brand-logo" src="./public/logo-consultorio-digital.png" alt="Consultório Digital" onerror="this.style.display='none'" />
        <span class="brand-text"><span class="brand-up">UP</span><span class="brand-saude">SAÚDE</span></span>
      </div>
      <span class="badge">Etapa 1 de 4</span>
    </div>

    <section class="layout single">

      <article class="panel form-wrap">
        <header class="form-header">
          <h2>Dados profissionais</h2>
          <p>Preencha Nome, E-mail, CPF e CRM/registro para continuar.</p>
        </header>

        <form id="onboardingForm" class="form-grid" novalidate>
          <div>
            <label for="nome">Nome completo</label>
            <input id="nome" name="nome" type="text" placeholder="Seu nome" autocomplete="name" required />
          </div>

          <div>
            <label for="email">E-mail profissional</label>
            <input id="email" name="email" type="email" placeholder="voce@clinica.com" autocomplete="email" required />
          </div>

          <div class="row-2">
            <div>
              <label for="cpf">CPF</label>
              <input id="cpf" name="cpf" type="text" placeholder="000.000.000-00" inputmode="numeric" required />
            </div>
            <div>
              <label for="crm">CRM / Registro profissional</label>
              <input id="crm" name="crm" type="text" placeholder="CRM-00000" required />
            </div>
          </div>

          <p class="error-text" id="formMsg"></p>

          <button class="btn btn-primary btn-lg" type="submit">Continuar para o consultório digital</button>
          <a class="btn btn-outline" href="./index.html">Voltar</a>

          <p class="footnote">Seus dados são usados apenas para liberar seu acesso profissional.</p>
        </form>
      </article>
    </section>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
